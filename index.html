<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kavi-ET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div>
          <h1>Kavi-ET</h1>
          <p>Keep your spending in view and manage it locally.</p>
        </div>
        <div class="tabs" role="tablist" aria-label="Main views">
          <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
          <button class="tab-btn" data-tab="add-expense">Add Expense</button>
        </div>
      </header>

      <section id="dashboard-view" class="view active">
        <section class="panel summary-panel">
          <h2>Overview</h2>
          <div class="summary-grid">
            <div class="summary-card highlighted">
              <span>Total Spent</span>
              <strong id="total">₹0.00</strong>
            </div>
            <div class="summary-card">
              <span>This Month</span>
              <strong id="monthly-total">₹0.00</strong>
            </div>
            <div class="summary-card">
              <span>Categories</span>
              <strong id="category-count">0</strong>
            </div>
            <div class="summary-card">
              <span>Average Expense</span>
              <strong id="average-expense">₹0.00</strong>
            </div>
            <div class="summary-card">
              <span>Top Category</span>
              <strong id="top-category">-</strong>
            </div>
          </div>
          <div class="chart-row">
            <div class="chart-card">
              <h3>Spending by Category</h3>
              <canvas id="category-chart" width="240" height="240"></canvas>
            </div>
            <div class="chart-card">
              <h3>Category Breakdown</h3>
              <div id="category-summary" class="category-summary"></div>
            </div>
          </div>
        </section>

        <section class="panel list-panel">
          <div class="list-header">
            <h2>Recent Expenses</h2>
            <button id="clear-all" class="secondary">Clear All</button>
          </div>
          <ul id="expense-list"></ul>
        </section>
      </section>

      <section id="add-expense-view" class="view">
        <section class="panel form-panel">
          <h2>Add Expense</h2>
          <form id="expense-form">
            <label>
              Amount (INR)
              <input id="amount" type="number" step="0.01" min="0" required />
            </label>
            <label>
              Description
              <input id="description" type="text" maxlength="80" required />
            </label>
            <label>
              Category
              <select id="category">
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills</option>
                <option value="Shopping">Shopping</option>
                <option value="Other">Other</option>
              </select>
            </label>
            <label>
              Date
              <input id="date" type="date" required />
            </label>
            <button type="submit">Save Expense</button>
          </form>
        </section>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
